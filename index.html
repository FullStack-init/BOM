<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOM Dashboard - Estilo Excel</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.6.0/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Calibri', 'Arial', 'sans-serif'] },
                    colors: { excel: { green: '#1d6f42', blue: '#4472c4', blueDark: '#2f5597' } }
                }
            }
        }
    </script>
    
    <style>
        body { font-size: 11px; -webkit-text-size-adjust: 100%; margin: 0; padding: 0; }
        
        /* 📱 Scroll optimizado */
        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
            position: relative;
        }
        .table-scroll::-webkit-scrollbar { height: 6px; width: 6px; }
        .table-scroll::-webkit-scrollbar-track { background: transparent; }
        .table-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .table-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Indicador de scroll */
        .table-scroll::after {
            content: '← desliza →';
            position: absolute;
            bottom: 4px; right: 10px;
            font-size: 9px; color: #666;
            background: rgba(255,255,255,0.9);
            padding: 2px 6px; border-radius: 3px;
            pointer-events: none; opacity: 0;
            transition: opacity 0.2s; z-index: 5;
        }
        @media (max-width: 768px) {
            .table-scroll::after { opacity: 1; }
            .table-scroll.scrolled::after { opacity: 0; }
        }
        
        /* 📊 Tabla compacta */
        .table-compact th, .table-compact td {
            padding: 4px 8px !important;
            vertical-align: middle;
        }
        .table-compact th {
            font-size: 10px;
            height: 28px;
        }
        .table-compact td {
            font-size: 10px;
            height: 26px;
        }
        
        /* Columna de numeración */
        .col-num {
            background: #f1f5f9;
            font-weight: 600;
            color: #64748b;
            text-align: center;
            width: 35px;
            min-width: 35px;
            user-select: none;
        }
        .table-compact thead .col-num {
            background: #3a67b8;
            color: white;
        }
        
        /* Celdas editables */
        td[contenteditable="true"]:focus { 
            outline: 2px solid #4472c4; 
            background: #fff; 
            border-radius: 2px;
        }
        td[contenteditable="true"]:hover {
            background: #fef3c7;
            cursor: text;
        }
        
        /* Poco stock */
        .poco-stock { background: #ffff00; color: #cc0000; font-weight: bold; text-align: center; }
        
        /* Evitar zoom en iOS */
        input, select, textarea { font-size: 16px !important; }
        
        /* Botones táctiles */
        @media (max-width: 768px) {
            .btn { min-height: 44px; }
            body { padding: 4px; }
            .table-compact th, .table-compact td { padding: 5px 6px !important; }
        }
        
        /* Header fijo */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 20;
        }
        
        /* Prevenir layout shift en rotación */
        .table-wrapper {
            contain: layout;
        }
    </style>
</head>
<body class="bg-base-200 min-h-screen">

<div class="container mx-auto px-2 py-2 max-w-full">
    
    <!-- Header con Admin Button a la izquierda -->
    <div class="flex items-center gap-2 mb-2 bg-base-100 p-2 rounded-lg shadow-sm border border-base-300">
        <button class="btn btn-ghost btn-sm btn-square flex-shrink-0" id="btnToggleAdmin" onclick="toggleAdminPanel()" aria-label="Modo Admin" title="Configuración">
            🔧
        </button>
        <h1 class="text-sm sm:text-base font-bold text-base-content whitespace-nowrap">BOM Dashboard</h1>
    </div>

    <!-- Panel Admin -->
    <div id="adminPanel" class="hidden card bg-base-100 shadow-sm mb-3 border border-base-300">
        <div class="card-body p-3">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
                <div class="card bg-base-200 border border-base-300">
                    <div class="card-body p-2">
                        <h4 class="text-[9px] sm:text-xs font-semibold uppercase text-base-content/70 mb-1">✏️ Edición</h4>
                        <button class="btn btn-sm btn-primary w-full mb-1 text-xs" id="btnEditMode" onclick="toggleEditMode()">Habilitar Edición</button>
                        <button class="btn btn-sm btn-secondary w-full text-xs" onclick="addComponent()">➕ Agregar</button>
                    </div>
                </div>
                <div class="card bg-base-200 border border-base-300">
                    <div class="card-body p-2">
                        <h4 class="text-[9px] sm:text-xs font-semibold uppercase text-base-content/70 mb-1">💾 Datos</h4>
                        <button class="btn btn-sm btn-success w-full mb-1 text-xs" id="btnSave" onclick="saveStorage()" disabled>Guardar</button>
                        <button class="btn btn-sm btn-error w-full text-xs" onclick="resetData()">🗑️ Restaurar</button>
                    </div>
                </div>
                <div class="card bg-base-200 border border-base-300">
                    <div class="card-body p-2">
                        <h4 class="text-[9px] sm:text-xs font-semibold uppercase text-base-content/70 mb-1">📤 Backup</h4>
                        <button class="btn btn-sm btn-ghost w-full border border-base-300 text-xs" onclick="exportJSON()">Descargar JSON</button>
                    </div>
                </div>
            </div>
            <div class="alert alert-info mt-2 py-1" id="statusBar"><span class="text-[9px] sm:text-xs">🟢 Sistema listo</span></div>
        </div>
    </div>

    <!-- Tabla Compacta -->
    <div class="card bg-base-100 shadow-sm border border-base-300 mb-3 table-wrapper">
        <div class="table-scroll" id="tableScroll">
            <table class="table table-zebra table-compact w-full min-w-[1050px]" id="mainTable">
                <thead class="bg-excel-blue text-white sticky-header">
                    <tr>
                        <th class="col-num">#</th>
                        <th class="whitespace-nowrap">Descripcion</th>
                        <th class="whitespace-nowrap">Fabricante</th>
                        <th class="whitespace-nowrap">Nº ref.</th>
                        <th class="whitespace-nowrap">Proveedor</th>
                        <th class="whitespace-nowrap">Cód. Prov.</th>
                        <th class="whitespace-nowrap">Envío</th>
                        <th class="whitespace-nowrap text-center">Cant.</th>
                        <th class="whitespace-nowrap">Precio</th>
                        <th class="whitespace-nowrap">Total</th>
                        <th class="whitespace-nowrap text-center">Stock</th>
                        <th class="whitespace-nowrap">Enlace</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla" class="text-xs"></tbody>
                <tfoot class="bg-excel-blue text-white text-xs font-bold sticky-header">
                    <tr>
                        <td class="col-num"></td>
                        <td colspan="8" class="text-right whitespace-nowrap">TOTAL GENERAL</td>
                        <td id="totalGeneral" class="bg-excel-blue-dark whitespace-nowrap">0,00 €</td>
                        <td colspan="2"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <!-- Botón Excel -->
    <div class="flex justify-center my-3">
        <button class="btn btn-success btn-md sm:btn-lg w-full sm:w-auto shadow-lg" onclick="exportExcel()">
            <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
            </svg>
            <span class="ml-2 text-sm sm:text-base">Descargar Excel</span>
        </button>
    </div>

    <!-- Notas -->
    <div class="card bg-base-100 shadow-sm border border-base-300">
        <div class="card-body p-3">
            <h3 class="card-title text-excel-blue text-xs sm:text-sm border-b border-excel-blue pb-2 mb-2">📝 Notas</h3>
            <ul class="text-[10px] sm:text-xs space-y-1">
                <li><strong>1. DigiKey:</strong> <a class="link link-primary" href="https://www.digikey.es/es/help-support/delivery-information/delivery-time-and-cost" target="_blank">Tiempos y costes</a></li>
                <li><strong>2. Mouser:</strong> <a class="link link-primary font-semibold" href="https://www.mouser.es/Tools/SavedCart/Share?AccessID=8aa49678b1" target="_blank">Carrito guardado</a></li>
                <li><strong>3. Mouser:</strong> <a class="link link-primary" href="https://www.mouser.es/help/orders-shipping" target="_blank">Ayuda pedidos</a></li>
            </ul>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'bom_compact_v2', DATA_FILE = 'data.json';
    const EDITABLES = ['Descripcion','Fabricante','No_ref_fabric','Proveedor','Codigo_Proveedor','Envio','Cantidad','Precio_Unitario','Stock','Enlace'];
    let orig = [], actual = [], editMode = false, adminOpen = false, changes = false, nextId = 0;

    async function init() { 
        await load(); 
        applyStorage(); 
        genId(); 
        render(); 
        setupScrollHint();
        setupOrientationFix(); // ← NUEVO: Arreglo para rotación
    }
    
    async function load() {
        try { const r = await fetch(DATA_FILE); if(!r.ok) throw new Error(r.status); orig = await r.json(); } 
        catch(e) { console.error(e); alert(`❌ Error cargando ${DATA_FILE}`); orig = []; }
    }
    
    function genId() { nextId = Math.max(-1, ...actual.map((d,i)=>d._id??i)) + 1; }

    function saveStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ actual, nextId, ts: new Date().toISOString()}));
        changes = false; status('✅ Guardado', 'success'); updateBtns();
    }
    
    function loadStorage() {
        try { const s = localStorage.getItem(STORAGE_KEY); if(s) { const p = JSON.parse(s); if(p.nextId) nextId = p.nextId; return p.data || []; } } 
        catch(e) { console.warn(e); } return null;
    }
    
    function applyStorage() {
        const s = loadStorage();
        if(s?.length) { actual = s; status('📦 Sesión cargada', 'info'); }
        else { actual = JSON.parse(JSON.stringify(orig)); status('🟢 Listo', 'info'); }
    }
    
    function clearStorage() { localStorage.removeItem(STORAGE_KEY); }

    // ← NUEVO: Fix para rotación de pantalla
    function setupOrientationFix() {
        let resizeTimeout;
        
        function handleResize() {
            // Forzar recálculo del layout
            const tableScroll = document.getElementById('tableScroll');
            if(tableScroll) {
                // Pequeño delay para asegurar que el DOM se actualizó
                setTimeout(() => {
                    tableScroll.style.overflowX = 'hidden';
                    setTimeout(() => {
                        tableScroll.style.overflowX = 'auto';
                        // Disparar evento scroll para actualizar indicador
                        tableScroll.dispatchEvent(new Event('scroll'));
                    }, 50);
                }, 100);
            }
        }
        
        // Escuchar cambios de orientación y resize
        window.addEventListener('orientationchange', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(handleResize, 300);
        });
        
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(handleResize, 300);
        });
    }

    function setupScrollHint() {
        const scroller = document.getElementById('tableScroll');
        if(!scroller) return;
        scroller.addEventListener('scroll', () => {
            scroller.classList.toggle('scrolled', scroller.scrollLeft > 10);
        }, { passive: true });
    }

    function render() {
        const tbody = document.getElementById('cuerpoTabla');
        tbody.innerHTML = ''; let total = 0;
        
        actual.forEach((item, idx) => {
            const p = parsePrice(item.Precio_Unitario), qty = +item.Cantidad||0, sub = p*qty; total += sub;
            const stock = +item.Stock||0, low = stock <= 12;
            const rowNum = idx + 1;
            
            const tr = document.createElement('tr'); 
            tr.className = 'hover:bg-base-200 transition-colors';
            
            const cols = [
                {type:'num', v:rowNum},
                {k:'Descripcion',e:1,w:'min-w-[120px]'}, 
                {k:'Fabricante',e:1,w:'min-w-[80px]'}, 
                {k:'No_ref_fabric',e:1,w:'min-w-[90px]'},
                {k:'Proveedor',e:1,w:'min-w-[70px]'}, 
                {k:'Codigo_Proveedor',e:1,w:'min-w-[90px]'}, 
                {k:'Envio',e:1,w:'min-w-[60px]'},
                {k:'Cantidad',e:1,t:'num',w:'min-w-[50px]',c:'text-center'}, 
                {k:'Precio_Unitario',e:1,t:'price',w:'min-w-[70px]'},
                {k:'Total',e:0,v:fmtPrice(sub),w:'min-w-[70px]'}, 
                {k:'Stock',e:0,v:low?`SÍ (${stock})`:`NO (${stock})`,c:(low?'poco-stock':'')+' text-center',w:'min-w-[50px]'},
                {k:'Enlace',e:1,t:'link',w:'min-w-[50px]'}
            ];

            cols.forEach((col, colIdx) => {
                const td = document.createElement('td');
                if(colIdx === 0) {
                    td.className = 'col-num';
                    td.textContent = rowNum;
                } else {
                    if(col.w) td.className = col.w + (col.c ? ' ' + col.c : ''); 
                    else if(col.c) td.className = col.c;
                    
                    if(col.e && EDITABLES.includes(col.k)) {
                        td.className += ' cursor-text hover:bg-yellow-100 transition';
                        td.contentEditable = editMode ? 'true' : 'false';
                        td.dataset.i = idx; td.dataset.f = col.k;
                        if(col.t==='link') {
                            const v = item[col.k]||''; 
                            td.innerHTML = v ? `<a class="link link-primary text-xs" href="${v.trim()}" target="_blank" onclick="event.stopPropagation()">Link</a>` : '-';
                        } else td.textContent = item[col.k] ?? '-';
                        if(editMode) { td.onblur = onBlur; td.onkeydown = onKey; }
                    } else { 
                        td.textContent = col.v ?? item[col.k] ?? '-'; 
                    }
                }
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
        document.getElementById('totalGeneral').textContent = fmtTotal(total);
    }

    function onBlur(e) {
        const td = e.target, i = +td.dataset.i, f = td.dataset.f, val = td.textContent.trim();
        if(f==='Cantidad'||f==='Stock') actual[i][f] = +val||0;
        else if(f==='Precio_Unitario') actual[i][f] = val.includes('€') ? val : `${val} €`;
        else actual[i][f] = val;
        changes = true; recalc(i); recalcTotal(); status('✏️ Pendiente guardar...', 'warning'); updateBtns();
    }
    function onKey(e) { if(e.key==='Enter') { e.preventDefault(); e.target.blur(); } }

    function parsePrice(t) { return t ? parseFloat(t.toString().replace('€','').replace(',','.').trim())||0 : 0; }
    function fmtPrice(v) { return `${v.toLocaleString('es-ES',{minimumFractionDigits:3})} €`; }
    function fmtTotal(v) { return v.toLocaleString('es-ES',{style:'currency',currency:'EUR'}); }

    function recalc(i) {
        const item = actual[i], sub = parsePrice(item.Precio_Unitario)*(item.Cantidad||0), stock = item.Stock||0;
        const row = document.querySelectorAll('#cuerpoTabla tr')[i];
        if(row) {
            row.children[9].textContent = fmtPrice(sub);
            const td = row.children[10], low = stock<=12;
            td.textContent = low ? `SÍ (${stock})` : `NO (${stock})`;
            td.className = (low ? 'poco-stock' : '') + ' text-center';
        }
    }
    function recalcTotal() {
        let sum = 0; actual.forEach(it => sum += parsePrice(it.Precio_Unitario)*(it.Cantidad||0));
        document.getElementById('totalGeneral').textContent = fmtTotal(sum);
    }

    function toggleAdmin() {
        adminOpen = !adminOpen;
        const panel = document.getElementById('adminPanel'), btn = document.getElementById('btnToggleAdmin');
        panel.classList.toggle('hidden', !adminOpen);
        btn.classList.toggle('btn-active', adminOpen);
    }

    function toggleEdit() {
        editMode = !editMode;
        const btn = document.getElementById('btnEditMode');
        btn.textContent = editMode ? '✅ Editando' : '✏️ Editar';
        btn.classList.toggle('btn-active', editMode);
        document.querySelectorAll('td[cursor-text]').forEach(td => {
            td.contentEditable = editMode ? 'true' : 'false';
            if(editMode) { td.onblur = onBlur; td.onkeydown = onKey; }
            else { td.onblur = null; td.onkeydown = null; }
        });
        status(editMode ? '✏️ Tocá una celda para editar' : '🔒 Modo lectura', editMode ? 'warning' : 'info');
        render();
    }

    function updateBtns() {
        const btn = document.getElementById('btnSave');
        btn.disabled = !changes; btn.textContent = changes ? '💾 Guardar' : '✅ Guardado';
    }
    function status(msg, type='info') {
        const el = document.getElementById('statusBar');
        el.className = `alert alert-${type} py-1`;
        el.innerHTML = `<span class="text-[9px] sm:text-xs">${msg}</span>`;
    }

    function addComponent() {
        actual.push({ _id: nextId++, Descripcion: 'Nuevo componente', Fabricante: '', No_ref_fabric: '', Proveedor: '', Codigo_Proveedor: '', Envio: '3-5 días', Cantidad: 1, Precio_Unitario: '0,00 €', Stock: 0, Enlace: '', Notas: '' });
        changes = true; render(); updateBtns(); status('➕ Agregado', 'warning');
        setTimeout(() => { 
            const rows = document.querySelectorAll('#cuerpoTabla tr'), last = rows[rows.length-1]; 
            if(last) { 
                last.scrollIntoView({behavior:'smooth',block:'center'}); 
                if(editMode) last.querySelector('td[cursor-text]')?.focus(); 
            }
        }, 150);
    }
    function resetData() {
        if(confirm('¿Restaurar datos originales?')) { 
            clearStorage(); actual = JSON.parse(JSON.stringify(orig)); genId(); changes = false; 
            render(); updateBtns(); status('🔄 Restaurado', 'info'); 
        }
    }

    function exportJSON() {
        if(changes) saveStorage();
        const clean = actual.map(({_id,...r})=>r);
        const blob = new Blob([JSON.stringify(clean,null,2)],{type:'application/json'}), url = URL.createObjectURL(blob), a = document.createElement('a');
        a.href = url; a.download = `bom_${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        status('✅ JSON descargado', 'success');
    }

    function exportExcel() {
        if(changes) saveStorage();
        let granTotal = 0;
        
        const datosParaExcel = actual.map((it, idx) => {
            const precioNum = parsePrice(it.Precio_Unitario);
            const cantidadNum = parseInt(it.Cantidad) || 0;
            const totalLinea = precioNum * cantidadNum;
            granTotal += totalLinea;

            return {
                "#": idx + 1,
                "Descripcion": it.Descripcion,
                "Fabricante": it.Fabricante,
                "Nº ref. fabric": it.No_ref_fabric,
                "Proveedor": it.Proveedor,
                "Código Proveedor": it.Codigo_Proveedor,
                "Tiempo de envío (días)": it.Envio,
                "Cantidad": cantidadNum,
                "Precio": it.Precio_Unitario,
                "Precio Total": totalLinea,
                "Poco Stock": (it.Stock||0) <= 12 ? "SÍ" : "NO",
                "Enlace": it.Enlace ? it.Enlace.trim() : ""
            };
        });

        const headers = ["#", "Descripcion", "Fabricante", "Nº ref. fabric", "Proveedor", "Código Proveedor", "Tiempo de envío (días)", "Cantidad", "Precio", "Precio Total", "Poco Stock", "Enlace"];
        const rows = [headers];
        
        datosParaExcel.forEach(row => {
            rows.push([
                row["#"], row["Descripcion"], row["Fabricante"], row["Nº ref. fabric"], row["Proveedor"],
                row["Código Proveedor"], row["Tiempo de envío (días)"], row["Cantidad"], 
                row["Precio"], row["Precio Total"], row["Poco Stock"], row["Enlace"]
            ]);
        });

        rows.push([
            "", "", "", "", "", "", "", "", "", 
            "TOTAL GENERAL", granTotal, "", ""
        ]);

        const ws = XLSX.utils.aoa_to_sheet(rows);
        ws['!cols'] = [
            { wch: 4 }, { wch: 30 }, { wch: 20 }, { wch: 20 }, { wch: 15 },
            { wch: 20 }, { wch: 12 }, { wch: 8 }, { wch: 12 }, { wch: 14 }, { wch: 12 }, { wch: 40 }
        ];

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "BOM_Placa_LED");
        const timestamp = new Date().toISOString().slice(0,10).replace(/-/g,'');
        XLSX.writeFile(wb, `BOM_Placa_LED_${timestamp}.xlsx`);
    }

    window.toggleAdminPanel = toggleAdmin;
    window.toggleEditMode = toggleEdit;
    window.guardarEnLocalStorage = saveStorage;
    window.resetDatos = resetData;
    window.agregarComponente = addComponent;
    window.exportarJSON = exportJSON;
    window.exportarExcel = exportExcel;

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
